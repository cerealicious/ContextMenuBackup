name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Use a stable version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --noconsole: Hides the console window (important for GUI apps)
        # --onefile: Bundles everything into a single .exe
        # --name: Sets the output filename
        pyinstaller --noconsole --onefile --name ContextKeeper context_menu_backup.pyw

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ContextKeeper-EXE
        path: dist/ContextKeeper.exe
